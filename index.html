<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — TropRapide</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #0d0d0d;
      --card2: #111;
      --border: #1e1e1e;
      --yellow: #F5C800;
      --green: #22C55E;
      --red: #EF4444;
      --orange: #F97316;
      --blue: #3B82F6;
      --text: #fff;
      --muted: #888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar h1 {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--yellow);
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .clock {
      color: var(--muted);
      font-size: .9rem;
    }

    /* BUTTONS */
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: .85rem;
      transition: opacity .2s;
    }

    .btn:active {
      opacity: .7;
    }

    .btn-yellow {
      background: var(--yellow);
      color: #000;
    }

    .btn-red {
      background: var(--red);
      color: #fff;
    }

    .btn-green {
      background: var(--green);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 16px 20px;
    }

    @media(max-width:900px) {
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .stat-card {
      background: var(--card2);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-val {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      height: calc(100vh - 135px);
    }

    @media(max-width:900px) {
      .main {
        grid-template-columns: 1fr;
      }
    }

    /* PANELS */
    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #080808;
    }

    .panel-header h2 {
      font-size: .95rem;
      font-weight: 800;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* RIGHT SIDE: Drivers + Log */
    .right-col {
      display: flex;
      flex-direction: column;
    }

    .right-panel {
      flex: 1;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .right-panel .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    /* ORDER ROW */
    .order-row {
      display: grid;
      grid-template-columns: 80px 1fr 90px 100px 80px;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: var(--card2);
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .order-id {
      font-weight: 900;
      color: var(--yellow);
      font-size: .85rem;
    }

    .order-info {
      min-width: 0;
    }

    .order-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-sub {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .order-zone {
      font-size: .8rem;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-nouvelle {
      background: #1a0a00;
      color: var(--orange);
    }

    .badge-acceptee {
      background: #0a1a00;
      color: var(--green);
    }

    .badge-prete {
      background: #1a1500;
      color: var(--yellow);
    }

    .badge-en-route {
      background: #001a1a;
      color: var(--blue);
    }

    .badge-livree {
      background: #0a1a0a;
      color: var(--green);
    }

    .dispatch-btn {
      background: var(--yellow);
      color: #000;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: .75rem;
      white-space: nowrap;
    }

    .dispatch-btn:disabled {
      opacity: .3;
      cursor: default;
    }

    /* DRIVER ROW */
    .driver-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: var(--card2);
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .driver-avatar {
      font-size: 1.6rem;
      width: 38px;
      text-align: center;
    }

    .driver-info {
      flex: 1;
      min-width: 0;
    }

    .driver-name {
      font-weight: 700;
    }

    .driver-meta {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .driver-badge {
      padding: 3px 8px;
      border-radius: 12px;
      font-size: .72rem;
      font-weight: 700;
    }

    .d-available {
      background: #022;
      color: var(--green);
    }

    .d-busy {
      background: #220;
      color: var(--orange);
    }

    /* LOG */
    .log-item {
      padding: 6px 10px;
      font-size: .8rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }

    .log-item .log-time {
      color: var(--yellow);
      margin-right: 8px;
      font-size: .72rem;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h1>🚀 ADMIN — TropRapide</h1>
    <div class="topbar-right">
      <span class="clock" id="clock"></span>
      <button class="btn btn-ghost" onclick="seedDemo()">🌱 Seed Démo</button>
      <button class="btn btn-yellow" onclick="forceDispatchAll()">⚡ Dispatch Tout</button>
      <button class="btn btn-green" onclick="releaseAllDrivers()">🔓 Libérer livreurs</button>
      <button class="btn btn-red" onclick="resetDB()">🗑️ Reset</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="s-total" style="color:var(--yellow)">0</div>
      <div class="stat-label">Commandes total</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-pending" style="color:var(--orange)">0</div>
      <div class="stat-label">En attente</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-enroute" style="color:var(--blue)">0</div>
      <div class="stat-label">En route</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-done" style="color:var(--green)">0</div>
      <div class="stat-label">Livrées</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-drivers" style="color:var(--green)">0</div>
      <div class="stat-label">Livreurs dispo</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-revenue" style="color:var(--yellow)">0</div>
      <div class="stat-label">Revenus (FCFA)</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: ORDERS -->
    <div class="panel">
      <div class="panel-header">
        <h2>📦 Commandes en temps réel</h2>
        <span id="order-count" style="color:var(--muted);font-size:.8rem;"></span>
      </div>
      <div class="panel-body" id="orders-list">
        <p style="color:var(--muted);text-align:center;margin-top:40px;">Connexion Firebase…</p>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-col">

      <!-- DRIVERS -->
      <div class="right-panel">
        <div class="panel-header">
          <h2>🏍️ Livreurs</h2>
          <span id="driver-count" style="color:var(--muted);font-size:.8rem;"></span>
        </div>
        <div class="panel-body" id="drivers-list"></div>
      </div>

      <!-- DISPATCH LOG -->
      <div class="right-panel" style="max-height:250px;">
        <div class="panel-header">
          <h2>📋 Dispatch Log</h2>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:.75rem;" onclick="clearLog()">Effacer</button>
        </div>
        <div class="panel-body" id="log-list" style="padding:0;">
          <p style="color:var(--muted);text-align:center;padding:20px;font-size:.8rem;">Log vide</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ============================================================
       FIREBASE CONFIGURATION
       ============================================================ */
    const firebaseConfig = {
      apiKey: "AIzaSyD0FL4ua8NUWKfwu_gGUL5TI1RkiNbBZnU",
      authDomain: "troprapide-821a7.firebaseapp.com",
      databaseURL: "https://troprapide-821a7-default-rtdb.firebaseio.com",
      projectId: "troprapide-821a7"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    /* ============================================================
       STATE (populated by Firebase real-time listener)
       ============================================================ */
    let state = { orders: {}, drivers: {}, log: {}, revenue: 0 };

    const ZONES = {
      'Cocody': { lat: 5.370, lng: -3.980 },
      'Koumassi': { lat: 5.290, lng: -4.010 },
      'Treichville': { lat: 5.300, lng: -4.005 },
      'Plateau': { lat: 5.320, lng: -4.020 },
      'Yopougon': { lat: 5.350, lng: -4.070 },
      'Adjamé': { lat: 5.360, lng: -4.025 }
    };

    const SEED_DRIVERS = {
      'd1': { name: 'Ali Koné', avatar: '🏍️', lat: 5.370, lng: -3.980, status: 'available', speed: 1.2, activeOrders: 0 },
      'd2': { name: 'Brice Yao', avatar: '🛵', lat: 5.300, lng: -4.050, status: 'available', speed: 1.0, activeOrders: 0 },
      'd3': { name: 'Cédric Ama', avatar: '🏍️', lat: 5.352, lng: -4.020, status: 'available', speed: 1.5, activeOrders: 0 }
    };

    /* XSS sanitization */
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function addLog(msg) {
      rtdb.ref('/log').push({ time: Date.now(), msg });
    }

    /* ============================================================
       MOTEUR DE DISPATCH INTELLIGENT
       score = distance + (charge * 2) - performance
       ============================================================ */
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function findBestDriver(order, drivers) {
      let best = null, bestScore = Infinity;
      const excluded = order.declinedBy ? Object.values(order.declinedBy) : [];
      Object.entries(drivers).forEach(([id, d]) => {
        if (d.status !== 'available') return;
        if (excluded.includes(id)) return;
        const dist = getDistance(order.lat, order.lng, d.lat, d.lng);
        const load = d.activeOrders || 0;
        const perf = d.speed || 1;
        const score = dist + (load * 2) - perf;
        if (score < bestScore) { bestScore = score; best = { id, ...d, _dist: dist.toFixed(1), _score: score.toFixed(2) }; }
      });
      return best;
    }

    function dispatchOrder(orderId) {
      const order = (state.orders || {})[orderId];
      if (!order || order.assignedTo || order.status === 'livree') return false;
      if (order.status !== 'prete' && order.status !== 'declined') {
        addLog(`⚠️ #${orderId.slice(-4)} pas encore prête`);
        return false;
      }
      const best = findBestDriver(order, state.drivers || {});
      if (!best) { addLog(`❌ Aucun livreur dispo pour #${orderId.slice(-4)}`); return false; }

      const updates = {};
      updates[`/orders/${orderId}/assignedTo`] = best.id;
      updates[`/orders/${orderId}/assignedName`] = best.name;
      updates[`/orders/${orderId}/status`] = 'attribue';
      updates[`/orders/${orderId}/dispatchedAt`] = Date.now();
      updates[`/livreurs/${best.id}/status`] = 'busy';
      updates[`/livreurs/${best.id}/activeOrders`] = (best.activeOrders || 0) + 1;
      updates[`/livreurs/${best.id}/currentOrder`] = orderId;
      rtdb.ref().update(updates);
      addLog(`✅ #${orderId.slice(-4)} → ${best.name} | ${best._dist} km | score ${best._score}`);
      return true;
    }

    function forceDispatchAll() {
      const orders = state.orders || {};
      const ready = Object.keys(orders).filter(id => orders[id].status === 'prete' && !orders[id].assignedTo);
      if (ready.length === 0) { alert('Aucune commande prête à dispatcher'); return; }
      ready.forEach(id => dispatchOrder(id));
    }

    /* ============================================================
       RENDER
       ============================================================ */
    function render() {
      const orders = state.orders || {};
      const drivers = state.drivers || {};
      const logObj = state.log || {};
      const log = Object.values(logObj).sort((a, b) => (b.time || 0) - (a.time || 0));

      /* ---- STATS ---- */
      const all = Object.values(orders);
      document.getElementById('s-total').textContent = all.length;
      document.getElementById('s-pending').textContent = all.filter(o => ['nouvelle', 'acceptee', 'prete', 'attribue', 'declined'].includes(o.status)).length;
      document.getElementById('s-enroute').textContent = all.filter(o => o.status === 'en-route').length;
      document.getElementById('s-done').textContent = all.filter(o => o.status === 'livree').length;
      document.getElementById('s-drivers').textContent = Object.values(drivers).filter(d => d.status === 'available').length;
      const rev = all.filter(o => o.status === 'livree').reduce((s, o) => s + (o.total || 0), 0);
      document.getElementById('s-revenue').textContent = rev.toLocaleString('fr');

      /* ---- ORDERS ---- */
      const orderList = document.getElementById('orders-list');
      const ordersSorted = Object.entries(orders).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));
      document.getElementById('order-count').textContent = ordersSorted.length + ' commandes';

      if (ordersSorted.length === 0) {
        orderList.innerHTML = '<p style="color:var(--muted);text-align:center;margin-top:40px;">Aucune commande — Clique sur "Seed Démo"</p>';
      } else {
        orderList.innerHTML = ordersSorted.map(([id, o]) => {
          const elapsed = Math.floor((Date.now() - (o.createdAt || Date.now())) / 60000);
          const canDispatch = o.status === 'prete' && !o.assignedTo;
          const statusBadge = {
            'nouvelle': `<span class="badge badge-nouvelle">🔴 Nouvelle</span>`,
            'acceptee': `<span class="badge badge-acceptee">🟠 Cuisine</span>`,
            'prete': `<span class="badge badge-prete">🟡 Prête</span>`,
            'attribue': `<span class="badge badge-en-route">📲 En attente livreur</span>`,
            'declined': `<span class="badge" style="background:#1a0000;color:var(--red);">⛔ Refusée — redispatch…</span>`,
            'en-route': `<span class="badge badge-en-route">🔵 En route</span>`,
            'livree': `<span class="badge badge-livree">✅ Livrée</span>`
          }[o.status] || `<span class="badge">${esc(o.status)}</span>`;

          return `
      <div class="order-row" style="${o.status === 'prete' && !o.assignedTo ? 'border-color:var(--yellow);' : ''}">
        <div class="order-id">#${id.slice(-4)}</div>
        <div class="order-info">
          <div class="order-name">${esc(o.client) || 'Client'}</div>
          <div class="order-sub">${esc(o.items)}</div>
          ${o.assignedName ? `<div class="order-sub" style="color:var(--blue)">🏍️ ${esc(o.assignedName)}</div>` : ''}
        </div>
        <div class="order-zone">📍 ${esc(o.zone)}<br><span style="color:var(--muted);font-size:.7rem;">${elapsed}min</span></div>
        <div>${statusBadge}</div>
        <div>
          <button class="dispatch-btn" ${canDispatch ? '' : 'disabled'} onclick="dispatchOrder('${id}')">
            ${canDispatch ? '⚡ Dispatch' : (o.assignedTo ? '✓ OK' : '—')}
          </button>
        </div>
      </div>`;
        }).join('');
      }

      /* ---- DRIVERS ---- */
      const driverList = document.getElementById('drivers-list');
      const driversSorted = Object.entries(drivers).sort((a, b) => a[1].name.localeCompare(b[1].name));
      document.getElementById('driver-count').textContent = driversSorted.length + ' livreurs';
      driverList.innerHTML = driversSorted.map(([id, d]) => `
    <div class="driver-row">
      <div class="driver-avatar">${d.avatar || '🏍️'}</div>
      <div class="driver-info">
        <div class="driver-name">${esc(d.name)}</div>
        <div class="driver-meta">
          Vitesse: ${d.speed || 1} • Commandes: ${d.activeOrders || 0}
          ${d.currentOrder ? ` • #${String(d.currentOrder).slice(-4)}` : ''}
        </div>
      </div>
      <span class="driver-badge ${d.status === 'available' ? 'd-available' : 'd-busy'}">
        ${d.status === 'available' ? '🟢 Dispo' : '🟠 Busy'}
      </span>
    </div>
  `).join('');

      /* ---- LOG ---- */
      const logEl = document.getElementById('log-list');
      if (log.length === 0) {
        logEl.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;font-size:.8rem;">Log vide</p>';
      } else {
        logEl.innerHTML = log.slice(0, 80).map(l => `
      <div class="log-item">
        <span class="log-time">${new Date(l.time).toLocaleTimeString('fr')}</span>${esc(l.msg)}
      </div>`).join('');
      }
    }

    /* ============================================================
       ACTIONS
       ============================================================ */
    function seedDemo() {
      const existingDrivers = state.drivers && Object.keys(state.drivers).length > 0;
      const drivers = existingDrivers ? state.drivers : SEED_DRIVERS;
      const clients = ['Koffi Mensah', 'Aicha Bamba', 'Chris Yao', 'Marie-Claire', 'Djibril Koné', 'Sandrine K.'];
      const zones = Object.keys(ZONES);
      const menus = ['Poulet braisé + Attiéké', 'Riz + Poisson braisé', 'Foutou + Sauce graine', 'Kedjenou + Riz', 'Poisson braisé + Alloco'];
      const prices = [3500, 2500, 2000, 3000, 4000];
      const updates = {};

      if (!existingDrivers) {
        Object.entries(SEED_DRIVERS).forEach(([id, d]) => { updates[`/livreurs/${id}`] = d; });
      }

      for (let i = 0; i < 6; i++) {
        const id = 'cmd' + Date.now() + i;
        const zone = zones[Math.floor(Math.random() * zones.length)];
        const z = ZONES[zone];
        const menuIdx = Math.floor(Math.random() * menus.length);
        const statusOpts = ['nouvelle', 'nouvelle', 'acceptee', 'prete', 'prete', 'en-route'];
        const status = statusOpts[i % statusOpts.length];
        const order = {
          client: clients[i % clients.length], items: menus[menuIdx],
          total: prices[menuIdx] + 500, zone,
          lat: z.lat + (Math.random() * .01 - .005), lng: z.lng + (Math.random() * .01 - .005),
          status, restaurant: 'TropRapide', restaurantLat: 5.340, restaurantLng: -4.010,
          createdAt: Date.now() - Math.floor(Math.random() * 600000),
          assignedTo: null, assignedName: null
        };
        if (status === 'en-route') {
          const dIds = Object.keys(drivers);
          const dId = dIds[i % dIds.length];
          order.assignedTo = dId;
          order.assignedName = drivers[dId].name;
          order.dispatchedAt = Date.now();
          updates[`/livreurs/${dId}/status`] = 'busy';
          updates[`/livreurs/${dId}/activeOrders`] = (drivers[dId].activeOrders || 0) + 1;
          updates[`/livreurs/${dId}/currentOrder`] = id;
        }
        updates[`/orders/${id}`] = order;
      }
      rtdb.ref().update(updates);
      addLog('🌱 Données de démo injectées');
    }

    function resetDB() {
      if (!confirm('Supprimer toutes les commandes et le log ?')) return;
      rtdb.ref('/orders').remove();
      rtdb.ref('/log').remove();
      const driverIds = Object.keys(state.drivers || SEED_DRIVERS);
      driverIds.forEach(id => {
        rtdb.ref(`/livreurs/${id}`).update({ status: 'available', activeOrders: 0, currentOrder: null });
      });
    }

    function clearLog() { rtdb.ref('/log').remove(); }

    function releaseAllDrivers() {
      const drivers = state.drivers || {};
      const updates = {};
      Object.keys(drivers).forEach(id => {
        updates[`/livreurs/${id}/status`] = 'available';
        updates[`/livreurs/${id}/activeOrders`] = 0;
        updates[`/livreurs/${id}/currentOrder`] = null;
      });
      if (Object.keys(updates).length === 0) { alert('Aucun livreur à libérer'); return; }
      rtdb.ref().update(updates);
      addLog('🔓 Tous les livreurs remis disponibles');
    }

    /* ============================================================
       AUTO-DISPATCH: surveille commandes "prête" non assignées
       ============================================================ */
    let _lastPrete = new Set();
    function autoDispatchWatcher() {
      const orders = state.orders || {};
      const toDispatch = Object.keys(orders).filter(id => {
        const o = orders[id];
        return (o.status === 'prete' || o.status === 'declined') && !o.assignedTo;
      });
      toDispatch.forEach(id => {
        if (!_lastPrete.has(id)) {
          _lastPrete.add(id);
          setTimeout(() => {
            const o2 = (state.orders || {})[id];
            const best = o2 ? findBestDriver(o2, state.drivers || {}) : null;
            if (best) {
              dispatchOrder(id);
            } else if (o2 && o2.status === 'declined') {
              rtdb.ref(`/orders/${id}`).update({ status: 'prete', declinedBy: null });
              addLog(`⚠️ Aucun livreur dispo pour #${id.slice(-4)} — remis en file`);
            }
            _lastPrete.delete(id);
          }, 800);
        }
      });
    }

    /* ============================================================
       INIT
       ============================================================ */
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr'); }, 1000);

    let _knownOrderIds = new Set();
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [[660, 0], [880, .2], [1100, .4]].forEach(([f, t]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f;
          g.gain.setValueAtTime(.5, ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .18);
          o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .19);
        });
        setTimeout(() => ctx.close(), 800);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      } catch (e) { }
    }

    /* Firebase real-time listeners — separate paths (avoids root permission issues) */
    let _initialLoad = true;
    let _ordersReady = false, _driversReady = false;

    function onFirebaseUpdate() {
      if (!_ordersReady || !_driversReady) return;
      const currentIds = Object.keys(state.orders || {});
      if (!_initialLoad) {
        let hasNew = false;
        currentIds.forEach(id => { if (!_knownOrderIds.has(id)) { hasNew = true; } });
        if (hasNew) playBeep();
      }
      currentIds.forEach(id => _knownOrderIds.add(id));
      _initialLoad = false;
      autoDispatchWatcher();
      render();
    }

    rtdb.ref('/orders').on('value', snap => {
      state.orders = snap.val() || {};
      _ordersReady = true;
      onFirebaseUpdate();
    }, err => {
      document.getElementById('orders-list').innerHTML =
        `<p style="color:var(--red);text-align:center;padding:20px;">❌ Erreur Firebase: ${err.code}<br>Vérifiez les règles Realtime Database</p>`;
    });

    rtdb.ref('/livreurs').on('value', snap => {
      state.drivers = snap.val() || {};
      _driversReady = true;
      onFirebaseUpdate();
    }, err => {
      console.error('livreurs:', err.code);
      _driversReady = true;
      onFirebaseUpdate();
    });

    rtdb.ref('/log').on('value', snap => {
      state.log = snap.val() || {};
      if (_ordersReady && _driversReady) render();
    }, err => console.error('log:', err.code));

    rtdb.ref('/revenue').on('value', snap => {
      state.revenue = snap.val() || 0;
    }, () => {});
  </script>
</body>
